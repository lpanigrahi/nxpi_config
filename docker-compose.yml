# =============================================================================
# NXPi (Neogen) — SELF-CONTAINED production stack for an Azure Ubuntu VM.
#
# This folder is a standalone deployment package: it has NO dependency on the
# application repository checkout. It is the single-file flatten of the
# repo's proven `docker-compose.yml` + `compose.azure.yml` overlay:
#
#   • the app image is PULLED from the registry (never built on the VM)
#   • Caddy is the only public ingress (80/443); the app port is not published
#   • Postgres (pgvector) + Redis with healthchecks, memory limits, log caps
#   • file-based secrets (./secrets/*) bridged to env by secrets-entrypoint.sh
#   • one-shot DB provisioning (`bootstrap`, profile: init) and day-2 additive
#     schema sync (`migrate`, profile: update) — these clone the application
#     repo INSIDE the container at ${GIT_REF} (no checkout needed on the VM)
#
# Quick start (or just run ./install.sh, which automates all of this):
#   docker compose pull
#   docker compose up -d postgres redis
#   docker compose --profile init run --rm bootstrap    # fresh DB only
#   docker compose up -d
#   # Day-2 schema updates: docker compose --profile update run --rm migrate
#
# Requires:
#   ./secrets/*        real secret files (generated by ./install.sh; secrets/README.md)
#   ./.env             Compose interpolation: APP_IMAGE, BETTER_AUTH_URL, GIT_REF, …
#   ./.env.app         app runtime env: at least one LLM provider key
#
# Project name is `neogen` on purpose: volume names match the repo-checkout
# stack (`neogen_postgres-data`, …), so this package ADOPTS the data of a VM
# that was previously deployed from the repo overlay.
# =============================================================================
name: neogen

# Per-service log rotation (prevents unbounded disk growth in production).
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Baseline hardening — disallow privilege escalation via setuid binaries.
x-security: &security
  - "no-new-privileges:true"

services:
  # ── Data tier ───────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: neogen_admin
      POSTGRES_DB: neogen
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - backend
    restart: unless-stopped
    logging: *logging
    security_opt: *security
    # NOTE: no cap_drop here on purpose — the official postgres entrypoint
    # needs SETUID/SETGID/CHOWN/FOWNER/DAC_OVERRIDE to drop to the postgres
    # user and own its data dir; trimming caps risks bricking the data tier.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neogen_admin -d neogen"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    # Build a redis.conf from the mounted secret so the password is NEVER in
    # the redis-server process argv ($$ → $ after compose interpolation), and
    # cap Redis BELOW its 256m cgroup limit: with the default maxmemory=0 the
    # KERNEL OOM-kills redis under queue growth (abrupt failure, possible AOF
    # truncation) instead of Redis erroring gracefully. noeviction is REQUIRED
    # by BullMQ — evicting queue keys corrupts job state.
    # The final exec goes back THROUGH the image's own entrypoint: with
    # $1=redis-server it chowns /data and drops to the unprivileged `redis`
    # user via setpriv — a bare `exec redis-server` here would silently keep
    # redis running as root (the entrypoint only drops for that exact argv).
    # The conf is 0600 and chowned to redis before the drop.
    command:
      - sh
      - -c
      - |
        umask 077
        printf 'appendonly yes\ndir /data\nmaxmemory 192mb\nmaxmemory-policy noeviction\nrequirepass %s\n' "$$(cat /run/secrets/redis_password)" > /tmp/redis.conf
        chown redis /tmp/redis.conf
        exec /usr/local/bin/docker-entrypoint.sh redis-server /tmp/redis.conf
    secrets:
      - redis_password
    volumes:
      - redis-data:/data
    networks:
      - backend
    restart: unless-stopped
    logging: *logging
    security_opt: *security
    healthcheck:
      test:
        ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/redis_password) redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Application — pulled from the registry, never built on the VM ─────────
  app:
    image: ${APP_IMAGE:?set APP_IMAGE in ./.env to the registry image ref}
    # Map *_FILE secrets → env, then re-exec the image's tini init + CMD.
    # NOTE: overriding `entrypoint` clears the image CMD, so it is restated
    # here; the shim receives it as "$@" and runs `tini -- node server.js`.
    entrypoint: ["sh", "/secrets-entrypoint.sh"]
    command: ["node", "server.js"]
    env_file:
      # LLM provider keys + optional runtime config (see .env.app.example).
      - ./.env.app
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NO_HTTPS: "1"
      # BETTER_AUTH_URL alone drives trusted origins/callbacks — the app does
      # NOT read a BETTER_AUTH_TRUSTED_ORIGINS env var (it would be inert).
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?set BETTER_AUTH_URL in ./.env (http://<vm-ip> or https://<domain>)}
      FILE_STORAGE_PREFIX: uploads
      ENABLE_CRON: "true"
      RUN_BACKGROUND_SERVICES: "true"
      # Never run the boot-time migrator: the image's bundled migration tree is
      # STALE (journal stops early) and would build a partial schema / crash-
      # loop. The schema is owned by the `bootstrap`/`migrate` one-shots below
      # (drizzle-kit push from schema.pg.ts + journal stamp).
      AUTO_DB_MIGRATE: "false"
      # File-based secrets → env, performed by ./secrets-entrypoint.sh:
      POSTGRES_URL_FILE: /run/secrets/postgres_url
      REDIS_URL_FILE: /run/secrets/redis_url
      BETTER_AUTH_SECRET_FILE: /run/secrets/better_auth_secret
    secrets:
      - postgres_url
      - redis_url
      - better_auth_secret
    # Plain named volumes for the app's disk paths. On first use Docker
    # populates a fresh volume from the image path — content AND ownership
    # (nextjs:nodejs 1001) — so the non-root app can write immediately.
    volumes:
      - uploads-data:/app/uploads
      - backups-data:/app/backups
      # npx cache: stdio MCP servers not pre-installed in the image download
      # once per volume lifetime, not per boot.
      - npm-cache-data:/app/.npm-cache
      - ./secrets-entrypoint.sh:/secrets-entrypoint.sh:ro
      # /tmp → tmpfs (ephemeral), sized so the bash sandbox + ad-hoc writes
      # fail with ENOSPC instead of OOMing the container.
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 536870912
    # No published ports — Caddy is the only ingress and reaches `app:3000`
    # over the frontend network. No `dns:` pin either — Azure VMs must use the
    # VNet's Azure-provided resolver (hardcoding 8.8.8.8 breaks Private
    # Endpoints / private DNS zones).
    networks:
      - frontend
      - backend
    restart: unless-stopped
    logging: *logging
    security_opt: *security
    # The app is a non-root (uid 1001) node process on an unprivileged port —
    # it needs no Linux capabilities at all. (read_only rootfs was evaluated
    # and deliberately NOT set: Next.js standalone writes runtime caches under
    # /app and the image pre-creates writable dirs there; the writable surface
    # is already narrowed to the named volumes + the /tmp tmpfs below.)
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/health/ready || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Reverse proxy: HTTP on :80 by default; HTTPS (Let's Encrypt) with a domain
  # Deliberately NO depends_on on `app`: caddy answers 502 while the app is
  # starting/updating instead of leaving 80/443 unbound. With a dependency,
  # every app update (`pull` + `up -d`) would also recreate caddy and hold the
  # public ports closed for the whole app boot window (~40s+) — this way an
  # app update really is a single-container rolling restart.
  caddy:
    image: caddy:2-alpine
    environment:
      # Consumed by ./Caddyfile as {$SITE_ADDRESS}. Defaulted HERE (not in the
      # Caddyfile) because Caddy's {$VAR:default} ignores set-but-empty vars.
      #   unset (default)          → ":80" = plain HTTP on the VM IP (IP-only mode)
      #   SITE_ADDRESS=example.com → auto-TLS via Let's Encrypt (set in ./.env)
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      # Custom-certificate mode (optional): consumed by certs/tls.caddy —
      # written by ./generate-certs.sh — as {$TLS_CERT_PATH}/{$TLS_KEY_PATH}.
      # Defaults match the generate-certs.sh output names; override only for
      # differently-named files under ./certs (mounted read-only at /certs).
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/certs/fullchain.crt}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/certs/server.key}
    ports:
      # Host ports are interpolable so the stack can also be smoke-tested on a
      # workstation where 80/443 are taken. On the VM leave them at defaults.
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro     # operator-supplied cert/key + tls.caddy snippet
      - caddy-data:/data      # persisted ACME account + issued certificates
      - caddy-config:/config
    networks:
      - frontend              # same network as `app` ⇒ the name `app` resolves
    restart: unless-stopped
    logging: *logging
    security_opt: *security
    # Caddy runs as root inside the container but only needs to bind 80/443
    # and write its own /data volume — drop everything else.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Probe Caddy's own admin API (binds 127.0.0.1:2019 — use the IPv4 literal;
    # busybox wget resolves `localhost` to ::1 first and gets refused) — proves
    # the config loaded and the process serves, independent of app health.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2019/config/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Database provisioning: SOURCELESS (no clone, no build) ───────────────────
  # There are deliberately NO node/git one-shot services here. The database is
  # provisioned by ./install.sh applying pre-generated static SQL with plain
  # psql inside the `postgres` container:
  #   db/<version>/schema.sql   full DDL (pg_dump --schema-only)
  #   db/<version>/grants.sql   least-privilege neo_gen role + grants
  #   db/<version>/seed.sql     reference seed (admin email + password hash
  #                             injected per-deploy via psql -v)
  # The admin password hash is computed on the target by the public `nxpi-hash`
  # helper image (Better Auth scrypt; no application source). Day-2 schema
  # changes apply db/<version>/migrate-<version>.sql the same way. This is why
  # the deploy target needs NO source, NO drizzle-kit, and NO git access.
  # See docs/SOURCELESS-DEPLOYMENT-PLAN.md.

# ── Internal network split: backend has NO egress (data tier isolated) ──────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

# ── Named volumes ────────────────────────────────────────────────────────────
# Keys match the repo-checkout stack (project `neogen`) so this package adopts
# existing data on a VM that migrated from the overlay deployment.
volumes:
  postgres-data:
  redis-data:
  uploads-data:
  backups-data:
  npm-cache-data:
  # Caddy's durable state (holds your TLS certs/ACME account — do not lose).
  caddy-data:
  caddy-config:

# ── File-based secrets (generated by ./install.sh; see secrets/README.md) ────
# The app connects as the least-privilege neo_gen role (postgres_url). DDL is
# applied by ./install.sh as the local neogen_admin superuser inside the
# postgres container (no privileged URL / TCP superuser needed).
secrets:
  postgres_password:
    file: ./secrets/postgres_password
  redis_password:
    file: ./secrets/redis_password
  postgres_url:
    file: ./secrets/postgres_url
  redis_url:
    file: ./secrets/redis_url
  better_auth_secret:
    file: ./secrets/better_auth_secret
